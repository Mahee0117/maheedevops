<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            
        }
        body{
            align-items: center;
        }

        .container{
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        form{
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        label{
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input{
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        button{
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        
    </style>
</head>
<body>

    <div class="container">
        <h1>Student Portal</h1>
        <div class="subtitle">Enter your details to register in the system</div>

        {% if error %}
            <div class="error-alert">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                </svg>
                <span>{{ error }}</span>
            </div>
        {% endif %}

        <form action="/submit" method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" value="{{ name or '' }}" placeholder="John Doe" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" value="{{ email or '' }}" placeholder="john@example.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="department">Department</label>
                <input type="text" id="department" name="department" value="{{ department or '' }}" placeholder="Computer Science" required>
            </div>

            <button type="submit">Submit Registration</button>
        </form>
    </div>

</body>
</html>
